services:
  db:
    image: postgres:16
    container_name: syachosyogi_db
    restart: always
    environment:
      POSTGRES_USER: syachosyogi
      POSTGRES_PASSWORD: syachosyogi
      POSTGRES_DB: syachosyogi
    ports:
      - "5432:5432"
    volumes:
      - syachosyogi_db_data:/var/lib/postgresql/data

  gobdb:
    image: postgres:16
    container_name: gob_db
    restart: always
    environment:
      POSTGRES_USER: gob
      POSTGRES_PASSWORD: gob1234
      POSTGRES_DB: gob
    ports:
      - "5433:5432"
    volumes:
      - gob_db_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SYACHO_VITE_API_URL: /api
        SYACHO_VITE_BASE_PATH: /
        GOBBLET_VITE_API_URL: /gobblet/api
        GOBBLET_VITE_BASE_PATH: /gobblet/
    container_name: syachosyogi_app
    restart: always
    depends_on:
      - db
      - gobdb
    environment:
      NODE_ENV: production
      PORT: 8080
      CORS_ORIGIN: http://3.26.160.21
      SYACHO_DATABASE_URL: postgresql://syachosyogi:syachosyogi@db:5432/syachosyogi?schema=public
      GOBBLET_DATABASE_URL: postgresql://gob:gob1234@gobdb:5432/gob?schema=public
    ports:
      - "80:8080"

volumes:
  syachosyogi_db_data:
  gob_db_data:
