server {
    listen 80;
    server_name _;

    # API proxy
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # syasho-syogi
    location /syasho-syogi/ {
        alias /usr/share/nginx/html/syasho-syogi/;
        try_files $uri $uri/ /syasho-syogi/index.html;
    }

    # gobblet-gobblers
    location /gobblet-gobblers/ {
        alias /usr/share/nginx/html/gobblet-gobblers/;
        try_files $uri $uri/ /gobblet-gobblers/index.html;
    }

    # root -> portfolio page
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # static assets (portfolio images, etc.)
    location /images/ {
        root /usr/share/nginx/html;
    }
}
