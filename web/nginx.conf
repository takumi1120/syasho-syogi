server {
    listen 80;
    server_name _;

    # syasho-syogi
    location /syasho-syogi/ {
        alias /usr/share/nginx/html/syasho-syogi/;
        try_files $uri $uri/ /syasho-syogi/index.html;
    }

    # gobblet-gobblers
    location /gobblet-gobblers/ {
        alias /usr/share/nginx/html/gobblet-gobblers/;
        try_files $uri $uri/ /gobblet-gobblers/index.html;
    }

    # root -> list apps
    location = / {
        default_type text/html;
        return 200 '<html><body><h1>Games</h1><ul><li><a href="/syasho-syogi/">syasho-syogi</a></li><li><a href="/gobblet-gobblers/">gobblet-gobblers</a></li></ul></body></html>';
    }
}
