name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      api_digest: ${{ steps.build_api.outputs.digest }}
      web_digest: ${{ steps.build_web.outputs.digest }}
      gobapi_digest: ${{ steps.build_gobapi.outputs.digest }}
      gobweb_digest: ${{ steps.build_gobweb.outputs.digest }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api
        id: build_api
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/takumi1120/syachosyogi-api:latest
            ghcr.io/takumi1120/syachosyogi-api:${{ github.sha }}

      - name: Build and push web
        id: build_web
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: true
          build-args: |
            VITE_API_URL=http://54.252.188.39:3000
          tags: |
            ghcr.io/takumi1120/syachosyogi-web:latest
            ghcr.io/takumi1120/syachosyogi-web:${{ github.sha }}

      - name: Build and push gobapi
        id: build_gobapi
        uses: docker/build-push-action@v6
        with:
          context: ./apps/Gobblet-gobblers/api
          push: true
          tags: |
            ghcr.io/takumi1120/syacho-gobblet-api:latest
            ghcr.io/takumi1120/syacho-gobblet-api:${{ github.sha }}

      - name: Build and push gobweb
        id: build_gobweb
        uses: docker/build-push-action@v6
        with:
          context: ./apps/Gobblet-gobblers/web
          push: true
          build-args: |
            VITE_API_URL=http://54.252.188.39:3001
          tags: |
            ghcr.io/takumi1120/syacho-gobblet-web:latest
            ghcr.io/takumi1120/syacho-gobblet-web:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      API_IMAGE: ghcr.io/takumi1120/syachosyogi-api@${{ needs.build-and-push.outputs.api_digest }}
      WEB_IMAGE: ghcr.io/takumi1120/syachosyogi-web@${{ needs.build-and-push.outputs.web_digest }}
      GOBAPI_IMAGE: ghcr.io/takumi1120/syacho-gobblet-api@${{ needs.build-and-push.outputs.gobapi_digest }}
      GOBWEB_IMAGE: ghcr.io/takumi1120/syacho-gobblet-web@${{ needs.build-and-push.outputs.gobweb_digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          sed -i 's/\r$//' ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keygen -y -f ~/.ssh/id_ed25519 > /dev/null
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload compose file
        shell: bash
        run: |
          scp -i ~/.ssh/id_ed25519 docker-compose.yml "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/syacho-deploy-compose.yml"

      - name: Deploy to EC2
        shell: bash
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" 'bash -se' << EOF
            set -euxo pipefail

            cd "${{ secrets.APP_DIR }}"

            compose() {
              sudo env \
                API_IMAGE="${API_IMAGE}" \
                WEB_IMAGE="${WEB_IMAGE}" \
                GOBAPI_IMAGE="${GOBAPI_IMAGE}" \
                GOBWEB_IMAGE="${GOBWEB_IMAGE}" \
                docker compose \
                  --project-directory "${{ secrets.APP_DIR }}" \
                  --project-name "$(basename "${{ secrets.APP_DIR }}")" \
                  -f "/tmp/syacho-deploy-compose.yml" "\$@"
            }

            echo "Deploying images:"
            echo "API_IMAGE=${API_IMAGE}"
            echo "WEB_IMAGE=${WEB_IMAGE}"
            echo "GOBAPI_IMAGE=${GOBAPI_IMAGE}"
            echo "GOBWEB_IMAGE=${GOBWEB_IMAGE}"
            echo "APP_DIR=${{ secrets.APP_DIR }}"
            echo "DEPLOY_COMPOSE_FILE=/tmp/syacho-deploy-compose.yml"

            compose up -d db gobdb

            sudo docker container prune -f
            sudo docker image prune -af

            compose pull api
            compose run --rm -T api npx prisma migrate deploy < /dev/null
            compose up -d --force-recreate api
            sudo docker image prune -af

            compose pull web
            compose up -d --force-recreate web
            sudo docker image prune -af

            compose pull gobapi
            compose run --rm -T gobapi npx prisma migrate deploy < /dev/null
            compose up -d --force-recreate gobapi
            sudo docker image prune -af

            compose pull gobweb
            compose up -d --force-recreate gobweb
            sudo docker image prune -af

            compose ps

            sudo docker inspect syachosyogi_web --format 'syachosyogi_web={{.Image}}'
            sudo docker inspect gob_web --format 'gob_web={{.Image}}'
          EOF
